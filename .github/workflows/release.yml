name: Release

# Publishes @floatboat/nexus-* packages to npm using **Trusted Publishing**
# (OIDC). No long-lived NPM_TOKEN secret in the repo — npm CLI exchanges the
# GitHub Actions OIDC ID-token for a short-lived publish token at runtime.
#
# Trigger model:
# - `release: published`  → fires automatically when a GitHub Release is cut
#                           via `gh release create` or the Releases UI.
# - `workflow_dispatch`   → manual re-run from the Actions tab (useful when
#                           the first run failed and you don't want to
#                           delete/recreate the release).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  # Required for OIDC token exchange with npm's Trusted Publisher.
  # Without this the npm CLI can't fetch the GitHub OIDC token.
  id-token: write

env:
  NODE_VERSION: "22"
  # pnpm 10+ bundles npm CLI ≥11.5.1, which is the first version with
  # Trusted Publishing + --provenance support. Don't downgrade.
  PNPM_VERSION: "10.22.0"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Matches the Environment registered in the npmjs.com Trusted Publisher
    # config. If you removed the Environment field on the npm side, also
    # remove this line — the OIDC subject claim has to match exactly.
    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests (sanity)
        run: pnpm test

      - name: Build packages
        run: pnpm build

      # `--provenance` attaches an attestation (built from this CI run's
      # OIDC claims) to every published tarball, visible on each package
      # page on npmjs.com. Requires id-token: write above.
      - name: Publish packages with provenance
        run: pnpm -r --filter "./packages/*" publish --access public --no-git-checks --provenance
